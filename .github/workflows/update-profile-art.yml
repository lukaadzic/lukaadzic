name: Update profile art

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements-profile-art.txt

      - name: fetch contributions
        env:
          GH_PROFILE_USER: lukaadzic
        run: python scripts/fetch_contributions.py

      - name: render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "update contribution graph"
          git push
